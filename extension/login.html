<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ColdMatch — Sign in</title>
  <link rel="stylesheet" href="settings.css" />
  <style>
    body {
      width: 340px;
      min-height: 400px;
      padding: 24px;
      box-sizing: border-box;
      overflow-x: hidden;
    }
    .container {
      max-width: 100%;
      padding: 0;
      gap: 16px;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .error-msg {
      font-size: 13px;
      color: #DC2626;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 7px;
      padding: 9px 12px;
    }
    .success-msg {
      font-size: 13px;
      color: #059669;
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      border-radius: 7px;
      padding: 9px 12px;
      line-height: 1.5;
    }
    .signup-link {
      font-size: 12px;
      color: #6B7280;
      text-align: center;
    }
    .signup-link a {
      color: #7C3AED;
      text-decoration: none;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 9px 11px;
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 7px;
      font-size: 13px;
      color: #111827;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #7C3AED;
    }
    input::placeholder {
      color: #D1D5DB;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="logo">✦</div>
      <span class="header-title">ColdMatch</span>
      <span class="header-sub">Sign in</span>
    </div>

    <div id="success-msg" class="success-msg hidden">
      You're logged in! Go back to a LinkedIn profile and click the ColdMatch icon.
    </div>

    <form id="login-form" class="login-form">
      <div class="field-group">
        <label class="field-label" for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <div id="error-msg" class="error-msg hidden"></div>

      <button type="submit" id="submit-btn" class="action-btn">Sign in</button>

      <p class="signup-link">
        Don't have an account? <a href="https://coldmatch.co/signup.html" target="_blank">Create one</a>
      </p>
    </form>

  </div>
  <script>
    const BACKEND = "https://liken-server-production.up.railway.app";
    const form       = document.getElementById("login-form");
    const submitBtn  = document.getElementById("submit-btn");
    const errorEl    = document.getElementById("error-msg");
    const successEl  = document.getElementById("success-msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.classList.add("hidden");
      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in…";

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch(`${BACKEND}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || data.message || "Invalid email or password.";
          errorEl.classList.remove("hidden");
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign in";
          return;
        }

        const token = data.token || data.access_token;
        chrome.storage.local.set({ cm_token: token }, () => {
          chrome.action.setPopup({ popup: 'popup.html' });
          form.classList.add("hidden");
          successEl.classList.remove("hidden");
        });
      } catch (err) {
        errorEl.textContent = "Could not reach ColdMatch server. Try again.";
        errorEl.classList.remove("hidden");
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
